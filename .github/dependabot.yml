# Dependabot — cotygodniowe PR-y z aktualizacjami zależności Pythona i akcji GitHub.
# Runtime jest pusty (stdlib-only), więc realnie chodzi o dev-deps i akcje.
version: 2
updates:
  # Zależności Pythona z pyproject.toml. Runtime pusty (stdlib-only) — wszystkie
  # realne zależności to dev (pytest/ruff/mypy/pre-commit), grupowane w jeden PR.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      dev-dependencies:
        patterns:
          - "*"

  # Akcje GitHub — cotygodniowo. Dziś brak workflowów do skanowania, ale ekosystem
  # jest na miejscu i zadziała od razu, gdy w repo pojawi się .github/workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"
