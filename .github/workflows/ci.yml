# CI — serwerowe odzwierciedlenie bramek z .pre-commit-config.yaml (ruff / ruff-format / mypy)
# plus pytest. Pakiet jest stdlib-only, więc bez Qt/tk — cała robota to `uv run` w środowisku
# z [project.optional-dependencies].dev (to samo, co wołają lokalne hooki). Akcje przypięte do
# pełnych commit-SHA (Dependabot: ekosystem github-actions podbija je co tydzień).
name: CI

on:
  push:
    paths-ignore:
      - "**.md"
  pull_request:
    paths-ignore:
      - "**.md"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Pakiet deklaruje requires-python >=3.10 — testujemy cały zadeklarowany zakres.
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff (linter)
        run: uv run ruff check .

      - name: Ruff (formatter)
        run: uv run ruff format --check .

      - name: Mypy (type check)
        run: uv run mypy src/

      - name: Pytest (+ pokrycie)
        # Raport pokrycia w logu (term-missing pokazuje niepokryte linie, m.in.
        # gałęzie except w sondach). Próg 90% jako floor — zmierzone 96%; margines
        # na drobne wahania. Podnieść do 95% po dołożeniu testu na except
        # `check_tesseract --list-langs` (tools.py:112-113).
        run: uv run pytest --cov=src/chodzkos_detection --cov-report=term-missing --cov-fail-under=90
